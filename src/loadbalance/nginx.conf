# OpenResty Production Configuration
# 用于实际转发的生产实例配置
# 此文件由 web-admin 管理，大部分配置通过 include 自动生成

worker_processes auto;
error_log logs/error.log warn;
pid logs/nginx.pid;

# 事件配置
events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

# HTTP 配置
http {
    # Lua 模块路径
    lua_package_path "$prefix/../lua-plugins/?.lua;$prefix/../lua-plugins/?/init.lua;;";
    lua_package_cpath "$prefix/../lua-plugins/?.so;;";

    # 共享字典
    lua_shared_dict lua_api_limit 10m;    # Lua 共享字典 (API 限流)
    lua_shared_dict upstream_state 1m;    # upstream 状态

    # Worker 初始化
    init_worker_by_lua_block {
        -- 初始化插件
        local ok, err = pcall(function()
            local router = require "phone_range_router.phone_range_router"
            -- TODO: 从配置加载 range 数据
            local router_config = {
                header_name = "phone-number",
                default_upstream = "default_backend",
                ranges = {
                    { min = "13000000000", max = "13999999999", upstream = "backend_a" },
                    { min = "15000000000", max = "15999999999", upstream = "backend_b" }
                }
            }
            router.init_worker(router_config)
        end)
        if not ok then
            ngx.log(ngx.WARN, "Failed to init phone_range_router: ", err)
        end
    }

    # MIME 类型
    include mime.types;
    default_type application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    log_format json escape=json '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request":"$request",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"upstream_addr":"$upstream_addr",'
        '"http_referrer":"$http_referer",'
        '"http_user_agent":"$http_user_agent"'
    '}';

    access_log logs/access.log main;

    # 性能优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml application/xml+rss text/javascript application/x-javascript;

    # 限流配置
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # 上游保活
    upstream default_backend {
        server 127.0.0.1:8080;
        keepalive 32;
    }

    # 自动生成的配置
    include conf.d/upstream.conf;
    include conf.d/http.conf;
    # 注意: locations 已嵌入 http.conf 的 server 块中

    # 默认 server (兜底)
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # 健康检查端点
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # 默认拒绝未匹配的请求
        location / {
            return 404 "Not Found\n";
            add_header Content-Type text/plain;
        }
    }
}

# Stream 配置 (TCP/UDP 代理)
stream {
    # Lua 模块路径
    lua_package_path "$prefix/../lua-plugins/?.lua;$prefix/../lua-plugins/?/init.lua;;";

    # 日志格式
    log_format stream '$remote_addr [$time_local] '
                      '$protocol $status $bytes_sent $bytes_received '
                      '$session_time "$upstream_addr"';

    access_log logs/stream.log stream;

    # 自动生成的 stream 配置
    include conf.d/stream.conf;

    # 默认 TCP 代理 (可选)
    # server {
    #     listen 12345;
    #     proxy_pass backend_tcp;
    # }
}