# OpenResty Config Admin - Nginx Configuration
# 用于配置管理前端模块的后端服务

worker_processes auto;
error_log logs/error.log info;
pid logs/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # Lua 模块路径
    lua_package_path "$prefix/lualib/?.lua;$prefix/lualib/?/init.lua;;";
    lua_package_cpath "$prefix/lualib/?.so;;";

    # 共享字典
    lua_shared_dict config_cache 10m;  # 配置缓存
    lua_shared_dict status 5m;         # 状态统计

    # 初始化
    init_by_lua_block {
        local admin_api = require "admin.api"
        admin_api.init()
    }

    # MIME 类型
    include mime.types;
    default_type application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log logs/access.log main;

    sendfile on;
    keepalive_timeout 65;

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # 开发服务器 (带 API)
    server {
        listen 8080;
        server_name localhost;

        # 字符编码
        charset utf-8;

        # 前端静态文件 (开发模式使用代理到 Vite)
        location / {
            # 生产模式: root ../frontend/dist;
            # 开发模式: 代理到 Vite 开发服务器
            proxy_pass http://127.0.0.1:5173;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # API 路由
        location /api/ {
            content_by_lua_block {
                local admin_api = require "admin.api"
                admin_api.dispatch()
            }
        }
    }

    # 生产服务器 (仅静态文件)
    server {
        listen 8081;
        server_name localhost;

        charset utf-8;

        # 前端静态文件
        location / {
            root ../frontend/dist;
            try_files $uri $uri/ /index.html;
        }

        # API 路由
        location /api/ {
            content_by_lua_block {
                local admin_api = require "admin.api"
                admin_api.dispatch()
            }
        }
    }
}