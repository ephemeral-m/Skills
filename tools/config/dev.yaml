# Dev CLI 配置文件

# 项目信息
project:
  name: Skills
  languages: [c, lua]

# 远程机器配置
remote:
  host: 192.168.5.14
  port: 22
  user: root
  password: 123456
  workdir: /home/mxp/Skills

# 模块定义
modules:
  openresty:
    language: c
    path: src
    build: bash tools/scripts/build.sh
    test: bash tools/scripts/test.sh

# 同步排除
sync:
  exclude:
    - .git/
    - tools/results/
    - tools/state/
    - .idea/
    - .vscode/
    - "*.o"
    - "*.a"
    - "*.so"

# Pipeline 配置
pipeline:
  # 执行顺序
  steps:
    - sync
    - build
    - test
  # 失败行为
  stop_on_failure: true
  # 错误分析器路径
  fixers_dir: tools/fixers